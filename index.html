<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sayman Faucet - Free Testnet Tokens</title>
  <style>
    :root {
      --mono-000: #000000;
      --mono-100: #1a1a1a;
      --mono-400: #666666;
      --mono-800: #cccccc;
      --mono-900: #e6e6e6;
      --mono-950: #f5f5f5;
      --mono-1000: #ffffff;
      --grid: 8px;
      --border: 1px solid var(--mono-800);
      --success: #10b981;
      --error: #ef4444;
      --warning: #f59e0b;
    }

    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      color: var(--mono-100);
      background: var(--mono-1000);
      letter-spacing: -0.01em;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: calc(var(--grid) * 4);
    }

    .container {
      max-width: 600px;
      width: 100%;
      border: var(--border);
      background: var(--mono-1000);
    }

    .header {
      border-bottom: var(--border);
      padding: calc(var(--grid) * 4);
    }

    h1 {
      font-size: 32px;
      font-weight: 500;
      letter-spacing: -0.02em;
      margin-bottom: calc(var(--grid) * 1);
    }

    .subtitle {
      color: var(--mono-400);
      font-size: 14px;
      line-height: 1.6;
    }

    .network-badge {
      display: inline-block;
      padding: calc(var(--grid) * 0.5) calc(var(--grid) * 1.5);
      background: var(--mono-100);
      color: var(--mono-1000);
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-left: calc(var(--grid) * 1);
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      border-bottom: var(--border);
    }

    .info-item {
      padding: calc(var(--grid) * 3);
      border-right: var(--border);
      border-bottom: var(--border);
    }

    .info-item:last-child {
      border-right: none;
    }

    .info-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--mono-400);
      margin-bottom: calc(var(--grid) * 1);
    }

    .info-value {
      font-size: 20px;
      font-weight: 400;
      font-variant-numeric: tabular-nums;
    }

    .form-section {
      padding: calc(var(--grid) * 4);
      border-bottom: var(--border);
    }

    .form-group {
      margin-bottom: calc(var(--grid) * 3);
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--mono-400);
      margin-bottom: calc(var(--grid) * 1);
    }

    input {
      width: 100%;
      padding: calc(var(--grid) * 2);
      border: var(--border);
      background: var(--mono-1000);
      font-size: 14px;
      font-family: 'SF Mono', 'Consolas', monospace;
      color: var(--mono-100);
      transition: all 0.15s;
    }

    input:focus {
      outline: none;
      border-color: var(--mono-100);
    }

    input::placeholder {
      color: var(--mono-800);
    }

    .btn {
      width: 100%;
      padding: calc(var(--grid) * 2);
      background: var(--mono-100);
      color: var(--mono-1000);
      border: none;
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn:hover:not(:disabled) {
      background: var(--mono-000);
    }

    .btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .alert {
      padding: calc(var(--grid) * 3);
      border-bottom: var(--border);
      font-size: 13px;
      display: none;
      animation: slideDown 0.2s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .alert.show {
      display: block;
    }

    .alert-success {
      background: var(--mono-950);
      color: var(--success);
      border-left: 4px solid var(--success);
    }

    .alert-error {
      background: var(--mono-950);
      color: var(--error);
      border-left: 4px solid var(--error);
    }

    .alert-warning {
      background: var(--mono-950);
      color: var(--warning);
      border-left: 4px solid var(--warning);
    }

    .footer {
      padding: calc(var(--grid) * 3);
      text-align: center;
      font-size: 12px;
      color: var(--mono-400);
    }

    .footer a {
      color: var(--mono-100);
      text-decoration: none;
      border-bottom: 1px solid var(--mono-800);
      transition: all 0.15s;
    }

    .footer a:hover {
      border-bottom-color: var(--mono-100);
    }

    .loader {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--mono-400);
      border-top-color: var(--mono-1000);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: calc(var(--grid) * 1);
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .icon {
      font-size: 48px;
      margin-bottom: calc(var(--grid) * 2);
      opacity: 0.8;
    }

    @media (max-width: 768px) {
      .info-grid {
        grid-template-columns: 1fr;
      }
      
      .info-item {
        border-right: none;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="icon">🚰</div>
      <h1>
        SAYMAN FAUCET
        <span class="network-badge">TESTNET</span>
      </h1>
      <p class="subtitle">Free testnet tokens for development and testing</p>
    </div>

    <div class="info-grid">
      <div class="info-item">
        <div class="info-label">Amount</div>
        <div class="info-value">1000 SAYM</div>
      </div>
      <div class="info-item">
        <div class="info-label">Cooldown</div>
        <div class="info-value">10 min</div>
      </div>
      <div class="info-item">
        <div class="info-label">Network</div>
        <div class="info-value">Public Testnet</div>
      </div>
    </div>

    <div id="alert" class="alert"></div>

    <div class="form-section">
      <form id="faucet-form">
        <div class="form-group">
          <label for="address">Wallet Address</label>
          <input 
            type="text" 
            id="address" 
            placeholder="Enter 40-character address"
            maxlength="40"
            required
          >
        </div>

        <button type="submit" class="btn" id="claim-btn">
          Claim 1000 SAYM
        </button>
      </form>
    </div>

    <div class="footer">
      <a href="https://sayman-wallet-manager.vercel.app" target="_blank">
        Create Wallet
      </a>
      <span style="margin: 0 calc(var(--grid) * 2); color: var(--mono-800);">•</span>
      <a href="https://sayman.up.railway.app" target="_blank">
        Explorer
      </a>
      <span style="margin: 0 calc(var(--grid) * 2); color: var(--mono-800);">•</span>
      <a href="https://github.com/saymanlal/SAYMAN" target="_blank">
        GitHub
      </a>
    </div>
  </div>

  <script>
    const FAUCET_API = 'https://sayman-faucet.onrender.com/faucet';
    
    const form = document.getElementById('faucet-form');
    const addressInput = document.getElementById('address');
    const claimBtn = document.getElementById('claim-btn');
    const alertBox = document.getElementById('alert');
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const address = addressInput.value.trim();
      
      if (address.length !== 40) {
        showAlert('Address must be exactly 40 characters', 'error');
        return;
      }
      
      claimBtn.disabled = true;
      claimBtn.innerHTML = '<span class="loader"></span> Claiming...';
      
      try {
        const response = await fetch(FAUCET_API, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ address })
        });
        
        const data = await response.json();
        
        if (data.success) {
          showAlert(
            `✓ Success! ${data.amount} SAYM sent to ${address.substring(0, 8)}...${address.substring(32)}`,
            'success'
          );
          addressInput.value = '';
        } else {
          showAlert(data.error || 'Failed to claim tokens', 'error');
        }
      } catch (error) {
        showAlert('Network error. Please try again.', 'error');
        console.error('Faucet error:', error);
      } finally {
        claimBtn.disabled = false;
        claimBtn.innerHTML = 'Claim 1000 SAYM';
      }
    });
    
    function showAlert(message, type) {
      alertBox.className = `alert alert-${type} show`;
      alertBox.textContent = message;
      
      setTimeout(() => {
        alertBox.classList.remove('show');
      }, 10000);
    }
    
    // Validate address input (hex only)
    addressInput.addEventListener('input', (e) => {
      e.target.value = e.target.value.toLowerCase().replace(/[^a-f0-9]/g, '');
    });
  </script>
</body>
</html>
